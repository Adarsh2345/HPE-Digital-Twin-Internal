#cloud-config
# cloud-init for droplet-3-mgmt
# Installs Docker, deploys docker-compose.yml, and starts containers

ssh_authorized_keys:
  - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIOQUoRsprjs5iC21GSAcVD5CggBC0oIUaum+pF26C5Oc adarsh@LAPTOP-81IT6SP0
  - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIK6e/cEVchZcTRLEiL0KCscsCnlV6ODtn5EHZKtpKWSx hpe-digital-twin-deploy

package_update: true
package_upgrade: false

packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release

write_files:
  - path: /opt/device-exporter/device_exporter.py
    permissions: "0755"
    content: |
      import time
      import random
      from prometheus_client import start_http_server, Gauge

      PORT = 9200
      DROPLET = "droplet-3-mgmt"
      print(f"[+] Launching {DROPLET} device exporter on port {PORT}...")

      DEVICES = [
          {"id": "netbox", "role": "infrastructure-docs"},
          {"id": "neo4j", "role": "graph-database"},
          {"id": "python-app", "role": "middleware"},
          {"id": "spine-router", "role": "spine-switch"},
          {"id": "prometheus", "role": "metrics-collector"},
          {"id": "grafana", "role": "metrics-dashboard"},
          {"id": "node-exporter", "role": "metrics-exporter"},
          {"id": "cadvisor", "role": "container-metrics"},
      ]

      EDGES = [
          ("spine-router", "router-1"),
          ("spine-router", "router-2"),
          ("spine-router", "storage-router"),
      ]

      SERVICE_ROLES = {"infrastructure-docs", "graph-database", "middleware",
                        "metrics-collector", "metrics-dashboard"}
      ROUTER_ROLES = {"spine-switch"}

      CPU_GAUGE = Gauge('cpu_percent', 'CPU consumption percentage', ['id', 'droplet', 'role'])
      MEM_GAUGE = Gauge('memory_percent', 'Memory consumption percentage', ['id', 'droplet', 'role'])
      IOPS_GAUGE = Gauge('disk_iops', 'Disk Input/Output operations per second', ['id', 'droplet', 'role'])
      POWER_GAUGE = Gauge('power_watts', 'Power consumption in Watts', ['id', 'droplet', 'role'])
      TEMP_GAUGE = Gauge('temperature_celsius', 'Thermal core data', ['id', 'droplet', 'role'])

      LATENCY_GAUGE = Gauge('latency_ms', 'Network layer delay', ['source', 'target'])
      LOSS_GAUGE = Gauge('packet_loss_percent', 'Network data integrity degradation', ['source', 'target'])
      BW_GAUGE = Gauge('bandwidth_mbps', 'Network throughput allocation', ['source', 'target'])


      def gen_gauss(mean, std_dev, min_val, max_val):
          return max(min_val, min(max_val, random.gauss(mean, std_dev)))


      def device_metrics(role):
          if role in ROUTER_ROLES:
              return {
                  "cpu": gen_gauss(12.0, 5.0, 2.0, 95.0),
                  "mem": gen_gauss(45.0, 10.0, 20.0, 70.0),
                  "iops": gen_gauss(800.0, 150.0, 200.0, 2000.0),
                  "pwr": gen_gauss(180.0, 30.0, 100.0, 300.0),
                  "temp": gen_gauss(45.0, 5.0, 25.0, 90.0),
              }
          return {
              "cpu": gen_gauss(33.0, 8.0, 24.5, 42.0),
              "mem": gen_gauss(45.0, 10.0, 20.0, 70.0),
              "iops": gen_gauss(800.0, 150.0, 200.0, 2000.0),
              "pwr": gen_gauss(180.0, 30.0, 100.0, 300.0),
              "temp": gen_gauss(45.0, 5.0, 25.0, 90.0),
          }


      start_http_server(PORT)

      while True:
          for dev in DEVICES:
              m = device_metrics(dev["role"])
              labels = (dev["id"], DROPLET, dev["role"])
              CPU_GAUGE.labels(*labels).set(m["cpu"])
              MEM_GAUGE.labels(*labels).set(m["mem"])
              IOPS_GAUGE.labels(*labels).set(m["iops"])
              POWER_GAUGE.labels(*labels).set(m["pwr"])
              TEMP_GAUGE.labels(*labels).set(m["temp"])

          for source, target in EDGES:
              lat = gen_gauss(12.0, 3.0, 1.0, 50.0)
              loss = gen_gauss(0.05, 0.02, 0.0, 1.0)
              bw = gen_gauss(800.0, 100.0, 400.0, 1000.0)
              LATENCY_GAUGE.labels(source=source, target=target).set(lat)
              LOSS_GAUGE.labels(source=source, target=target).set(loss)
              BW_GAUGE.labels(source=source, target=target).set(bw)

          time.sleep(3)

  - path: /etc/systemd/system/device-exporter.service
    permissions: "0644"
    content: |
      [Unit]
      Description=HPE Digital Twin Device Exporter
      After=docker.service

      [Service]
      Type=simple
      ExecStart=/usr/bin/python3 /opt/device-exporter/device_exporter.py
      Restart=always
      RestartSec=5

      [Install]
      WantedBy=multi-user.target
  - path: /opt/prometheus/prometheus.yml
    permissions: "0644"
    content: |
      global:
        scrape_interval: 12s
        evaluation_interval: 12s

      scrape_configs:
        - job_name: "device-exporters"
          static_configs:
            - targets:
                - "10.10.0.4:9200"
                - "10.10.0.2:9200"
                - "10.10.0.3:9200"
                - "10.10.0.5:9200"

        - job_name: "node-exporter"
          static_configs:
            - targets:
                - "10.10.0.4:9100"
                - "10.10.0.2:9100"
                - "10.10.0.3:9100"
                - "10.10.0.5:9100"

        - job_name: "cadvisor"
          static_configs:
            - targets:
                - "10.10.0.4:8080"
                - "10.10.0.2:8080"
                - "10.10.0.3:8080"
                - "10.10.0.5:8080"

  - path: /opt/docker-compose/docker-compose.yml
    permissions: "0644"
    content: |
      version: "3.9"

      networks:
        mgmt-net:
          driver: bridge
          ipam:
            config:
              - subnet: "10.10.3.0/24"

      services:
        spine-router:
          image: frrouting/frr
          container_name: spine-router
          cap_add:
            - NET_ADMIN
            - SYS_ADMIN
          networks:
            mgmt-net:
              ipv4_address: "10.10.3.1"
          restart: unless-stopped
          volumes:
            - /etc/frr:/etc/frr

        netbox:
          image: netboxcommunity/netbox:latest
          container_name: netbox
          networks:
            mgmt-net:
              ipv4_address: "10.10.3.11"
          ports:
            - "8080:8080"
          restart: unless-stopped
          environment:
            - SUPERUSER_NAME=admin
            - SUPERUSER_EMAIL=admin@hpe-twin.local
            - SUPERUSER_PASSWORD=admin
            - ALLOWED_HOSTS=*
            - DB_HOST=localhost
            - DB_NAME=netbox
            - DB_USER=netbox
            - DB_PASSWORD=netbox
            - SECRET_KEY=hpe-digital-twin-secret-key-change-in-prod

        neo4j:
          image: neo4j:latest
          container_name: neo4j
          networks:
            mgmt-net:
              ipv4_address: "10.10.3.12"
          ports:
            - "7474:7474"
            - "7687:7687"
          restart: unless-stopped
          environment:
            - NEO4J_AUTH=none
          volumes:
            - neo4j-data:/data

        python-app:
          image: python:3.11
          container_name: python-app
          command: sleep infinity
          networks:
            mgmt-net:
              ipv4_address: "10.10.3.13"
          ports:
            - "5000:5000"
          restart: unless-stopped
          volumes:
            - /opt/python-app:/app
          working_dir: /app

        prometheus:
          image: prom/prometheus:latest
          container_name: prometheus
          networks:
            mgmt-net:
              ipv4_address: "10.10.3.17"
          ports:
            - "9090:9090"
          restart: unless-stopped
          volumes:
            - /opt/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
            - prometheus-data:/prometheus
          command:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"

        grafana:
          image: grafana/grafana:latest
          container_name: grafana
          networks:
            mgmt-net:
              ipv4_address: "10.10.3.18"
          ports:
            - "3000:3000"
          restart: unless-stopped
          environment:
            - GF_SECURITY_ADMIN_USER=admin
            - GF_SECURITY_ADMIN_PASSWORD=admin
          volumes:
            - grafana-data:/var/lib/grafana

        node-exporter:
          image: prom/node-exporter:latest
          container_name: node-exporter
          pid: host
          network_mode: host
          restart: unless-stopped
          volumes:
            - /proc:/host/proc:ro
            - /sys:/host/sys:ro
            - /:/rootfs:ro
          command:
            - "--path.procfs=/host/proc"
            - "--path.sysfs=/host/sys"
            - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"

        cadvisor:
          image: gcr.io/cadvisor/cadvisor:latest
          container_name: cadvisor
          privileged: true
          network_mode: host
          restart: unless-stopped
          volumes:
            - /:/rootfs:ro
            - /var/run:/var/run:ro
            - /sys:/sys:ro
            - /var/lib/docker/:/var/lib/docker:ro
            - /dev/disk/:/dev/disk:ro

      volumes:
        neo4j-data:
        prometheus-data:
        grafana-data:

runcmd:
  # Install Docker via official script
  - curl -fsSL https://get.docker.com | bash
  - systemctl enable docker
  - systemctl start docker
  # Install Docker Compose v2 plugin
  - mkdir -p /usr/local/lib/docker/cli-plugins
  - curl -SL "https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64" -o /usr/local/lib/docker/cli-plugins/docker-compose
  - chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
  # Install prometheus_client for device exporter
  - pip3 install prometheus_client
  # Start containers
  - cd /opt/docker-compose && docker compose up -d
  # Start device exporter
  - systemctl daemon-reload
  - systemctl enable --now device-exporter
