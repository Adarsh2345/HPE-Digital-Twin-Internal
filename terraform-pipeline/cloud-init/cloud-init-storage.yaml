#cloud-config
# cloud-init for droplet-4-storage
# Installs Docker, deploys docker-compose.yml, and starts containers

package_update: true
package_upgrade: false

packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release

write_files:
  - path: /opt/device-exporter/device_exporter.py
    permissions: "0755"
    content: |
      import time
      import random
      from prometheus_client import start_http_server, Gauge

      PORT = 9200
      DROPLET = "droplet-4-storage"
      print(f"[+] Launching {DROPLET} device exporter on port {PORT}...")

      DEVICES = [
          {"id": "storage-router", "role": "storage-tor"},
          {"id": "array-ctrl-a", "role": "storage-controller"},
          {"id": "array-ctrl-b", "role": "storage-controller"},
          {"id": "obj-node-1", "role": "object-storage"},
          {"id": "obj-node-2", "role": "object-storage"},
          {"id": "obj-node-3", "role": "object-storage"},
          {"id": "node-exporter", "role": "metrics-exporter"},
          {"id": "cadvisor", "role": "container-metrics"},
      ]

      EDGES = [
          ("storage-router", "array-ctrl-a"),
          ("storage-router", "array-ctrl-b"),
          ("storage-router", "obj-node-1"),
          ("storage-router", "obj-node-2"),
          ("storage-router", "obj-node-3"),
          ("array-ctrl-a", "array-ctrl-b"),
      ]

      ROUTER_ROLES = {"storage-tor"}
      STORAGE_ROLES = {"storage-controller", "object-storage"}

      CPU_GAUGE = Gauge('cpu_percent', 'CPU consumption percentage', ['id', 'droplet', 'role'])
      MEM_GAUGE = Gauge('memory_percent', 'Memory consumption percentage', ['id', 'droplet', 'role'])
      IOPS_GAUGE = Gauge('disk_iops', 'Disk Input/Output operations per second', ['id', 'droplet', 'role'])
      POWER_GAUGE = Gauge('power_watts', 'Power consumption in Watts', ['id', 'droplet', 'role'])
      TEMP_GAUGE = Gauge('temperature_celsius', 'Thermal core data', ['id', 'droplet', 'role'])

      LATENCY_GAUGE = Gauge('latency_ms', 'Network layer delay', ['source', 'target'])
      LOSS_GAUGE = Gauge('packet_loss_percent', 'Network data integrity degradation', ['source', 'target'])
      BW_GAUGE = Gauge('bandwidth_mbps', 'Network throughput allocation', ['source', 'target'])


      def gen_gauss(mean, std_dev, min_val, max_val):
          return max(min_val, min(max_val, random.gauss(mean, std_dev)))


      def device_metrics(role):
          if role in ROUTER_ROLES:
              return {
                  "cpu": gen_gauss(12.0, 5.0, 2.0, 95.0),
                  "mem": gen_gauss(45.0, 10.0, 20.0, 70.0),
                  "iops": gen_gauss(800.0, 150.0, 200.0, 2000.0),
                  "pwr": gen_gauss(180.0, 30.0, 100.0, 300.0),
                  "temp": gen_gauss(45.0, 5.0, 25.0, 90.0),
              }
          if role in STORAGE_ROLES:
              return {
                  "cpu": gen_gauss(33.0, 8.0, 24.5, 42.0),
                  "mem": gen_gauss(45.0, 10.0, 20.0, 70.0),
                  "iops": gen_gauss(1400.0, 250.0, 400.0, 4000.0),
                  "pwr": gen_gauss(180.0, 30.0, 100.0, 300.0),
                  "temp": gen_gauss(45.0, 5.0, 25.0, 90.0),
              }
          return {
              "cpu": gen_gauss(33.0, 8.0, 24.5, 42.0),
              "mem": gen_gauss(45.0, 10.0, 20.0, 70.0),
              "iops": gen_gauss(800.0, 150.0, 200.0, 2000.0),
              "pwr": gen_gauss(180.0, 30.0, 100.0, 300.0),
              "temp": gen_gauss(45.0, 5.0, 25.0, 90.0),
          }


      start_http_server(PORT)

      while True:
          for dev in DEVICES:
              m = device_metrics(dev["role"])
              labels = (dev["id"], DROPLET, dev["role"])
              CPU_GAUGE.labels(*labels).set(m["cpu"])
              MEM_GAUGE.labels(*labels).set(m["mem"])
              IOPS_GAUGE.labels(*labels).set(m["iops"])
              POWER_GAUGE.labels(*labels).set(m["pwr"])
              TEMP_GAUGE.labels(*labels).set(m["temp"])

          for source, target in EDGES:
              lat = gen_gauss(12.0, 3.0, 1.0, 50.0)
              loss = gen_gauss(0.05, 0.02, 0.0, 1.0)
              bw = gen_gauss(800.0, 100.0, 400.0, 1000.0)
              LATENCY_GAUGE.labels(source=source, target=target).set(lat)
              LOSS_GAUGE.labels(source=source, target=target).set(loss)
              BW_GAUGE.labels(source=source, target=target).set(bw)

          time.sleep(3)

  - path: /etc/systemd/system/device-exporter.service
    permissions: "0644"
    content: |
      [Unit]
      Description=HPE Digital Twin Device Exporter
      After=docker.service

      [Service]
      Type=simple
      ExecStart=/usr/bin/python3 /opt/device-exporter/device_exporter.py
      Restart=always
      RestartSec=5

      [Install]
      WantedBy=multi-user.target
  - path: /opt/docker-compose/docker-compose.yml
    permissions: "0644"
    content: |
      version: "3.9"

      networks:
        storage-net:
          driver: bridge
          ipam:
            config:
              - subnet: "10.10.4.0/24"

      services:
        storage-router:
          image: frrouting/frr
          container_name: storage-router
          cap_add:
            - NET_ADMIN
            - SYS_ADMIN
          networks:
            storage-net:
              ipv4_address: "10.10.4.1"
          restart: unless-stopped
          volumes:
            - /etc/frr:/etc/frr

        array-ctrl-a:
          image: ubuntu:24.04
          container_name: array-ctrl-a
          command: sleep infinity
          networks:
            storage-net:
              ipv4_address: "10.10.4.11"
          restart: unless-stopped
          cap_add:
            - NET_ADMIN

        array-ctrl-b:
          image: ubuntu:24.04
          container_name: array-ctrl-b
          command: sleep infinity
          networks:
            storage-net:
              ipv4_address: "10.10.4.12"
          restart: unless-stopped
          cap_add:
            - NET_ADMIN

        obj-node-1:
          image: minio/minio
          container_name: obj-node-1
          command: server /data --console-address ":9001"
          networks:
            storage-net:
              ipv4_address: "10.10.4.21"
          ports:
            - "9000:9000"
            - "9001:9001"
          restart: unless-stopped
          environment:
            - MINIO_ROOT_USER=admin
            - MINIO_ROOT_PASSWORD=admin123
          volumes:
            - minio-data-1:/data

        obj-node-2:
          image: minio/minio
          container_name: obj-node-2
          command: server /data --console-address ":9001"
          networks:
            storage-net:
              ipv4_address: "10.10.4.22"
          ports:
            - "9002:9000"
            - "9003:9001"
          restart: unless-stopped
          environment:
            - MINIO_ROOT_USER=admin
            - MINIO_ROOT_PASSWORD=admin123
          volumes:
            - minio-data-2:/data

        obj-node-3:
          image: minio/minio
          container_name: obj-node-3
          command: server /data --console-address ":9001"
          networks:
            storage-net:
              ipv4_address: "10.10.4.23"
          ports:
            - "9004:9000"
            - "9005:9001"
          restart: unless-stopped
          environment:
            - MINIO_ROOT_USER=admin
            - MINIO_ROOT_PASSWORD=admin123
          volumes:
            - minio-data-3:/data

        node-exporter:
          image: prom/node-exporter:latest
          container_name: node-exporter
          pid: host
          network_mode: host
          restart: unless-stopped
          volumes:
            - /proc:/host/proc:ro
            - /sys:/host/sys:ro
            - /:/rootfs:ro
          command:
            - "--path.procfs=/host/proc"
            - "--path.sysfs=/host/sys"
            - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"

        cadvisor:
          image: gcr.io/cadvisor/cadvisor:latest
          container_name: cadvisor
          privileged: true
          network_mode: host
          restart: unless-stopped
          volumes:
            - /:/rootfs:ro
            - /var/run:/var/run:ro
            - /sys:/sys:ro
            - /var/lib/docker/:/var/lib/docker:ro
            - /dev/disk/:/dev/disk:ro

      volumes:
        minio-data-1:
        minio-data-2:
        minio-data-3:

runcmd:
  # Install Docker via official script
  - curl -fsSL https://get.docker.com | bash
  - systemctl enable docker
  - systemctl start docker
  # Install Docker Compose v2 plugin
  - mkdir -p /usr/local/lib/docker/cli-plugins
  - curl -SL "https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64" -o /usr/local/lib/docker/cli-plugins/docker-compose
  - chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
  # Install prometheus_client for device exporter
  - pip3 install prometheus_client
  # Start containers
  - cd /opt/docker-compose && docker compose up -d
  # Start device exporter
  - systemctl daemon-reload
  - systemctl enable --now device-exporter
