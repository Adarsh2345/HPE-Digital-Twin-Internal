global:
  scrape_interval: 12s
  evaluation_interval: 12s

scrape_configs:
  - job_name: "hpe-digital-twin-telemetry"
    static_configs:
      # --- DROPLET 1: Edge Router (tor1) ---
      - targets: ["10.10.0.4:8000"]
        labels:
          id: "router-1"
          role: "edge-router"
          droplet: "droplet-1-tor1"
          rack: "compute-rack-1"
      - targets: ["10.10.0.4:8001"]
        labels:
          id: "router-1-anomaly"
          role: "edge-router"
          droplet: "droplet-1-tor1-anomaly"
          rack: "compute-rack-1"

      # --- DROPLET 2: Compute Node (tor2) ---
      - targets: ["10.10.0.2:8000"]
        labels:
          id: "server-1"
          role: "compute-node"
          droplet: "droplet-2-tor2"
          rack: "compute-rack-2"
      - targets: ["10.10.0.2:8001"]
        labels:
          id: "server-1-anomaly"
          role: "compute-node"
          droplet: "droplet-2-tor2-anomaly"
          rack: "compute-rack-2"

      # --- DROPLET 3: Management Node (mgmt) ---
      - targets: ["127.0.0.1:8000"]
        labels:
          id: "prometheus"
          role: "mgmt-service"
          droplet: "droplet-3-mgmt"
          rack: "management"
      - targets: ["127.0.0.1:8001"]
        labels:
          id: "prometheus-anomaly"
          role: "mgmt-service"
          droplet: "droplet-3-mgmt-anomaly"
          rack: "management"

      # --- DROPLET 4: Storage Fabric ---
      - targets: ["10.10.0.5:8000"]
        labels:
          id: "storage-router"
          role: "storage-router"
          droplet: "droplet-4-storage"
          rack: "storage"
      - targets: ["10.10.0.5:8001"]
        labels:
          id: "storage-router-anomaly"
          role: "storage-router"
          droplet: "droplet-4-storage-anomaly"
          rack: "storage"