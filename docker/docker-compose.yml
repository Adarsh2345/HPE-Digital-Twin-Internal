version: '3.8'

services:
  twin-redis:
    image: redis:alpine
    container_name: twin-redis
    ports:
      - "6379:6379"
    restart: always

  twin-neo4j:
    image: neo4j:latest
    container_name: twin-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password
    restart: always
    # ADD THIS HEALTHCHECK BLOCK BELOW:
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474/ || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s