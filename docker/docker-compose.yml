version: '3.8'

services:
  twin-redis:
    image: redis:alpine
    container_name: twin-redis
    ports:
      - "6379:6379"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 5

  twin-neo4j:
    image: neo4j:latest
    container_name: twin-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474/ || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s

  # 🟢 ADDED: Unified InfluxDB 2.7 Time-Series Storage Engine
  twin-influxdb:
    image: influxdb:2.7-alpine
    container_name: twin-influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=password12345
      - DOCKER_INFLUXDB_INIT_ORG=hpe-digital-twin-org
      - DOCKER_INFLUXDB_INIT_BUCKET=telemetry_bucket
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=my-super-secret-admin-token-12345
    volumes:
      - influxdb_data:/var/lib/influxdb2
    restart: always
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s

  # 🟢 Local per-device telemetry stack — stands in for the real droplet
  # Prometheus (which only exposes one droplet-wide reading per droplet).
  # See mock-scripts-local/ for rationale. Point PROMETHEUS_URL at
  # http://localhost:9090 to use this instead of the real remote instance.
  mock-exporter-droplet1:
    build: ../mock-scripts-local
    container_name: mock-exporter-droplet1
    command: ["mock_exporter_local_droplet1.py"]
    ports:
      - "9100:9100"
    restart: always

  mock-exporter-droplet2:
    build: ../mock-scripts-local
    container_name: mock-exporter-droplet2
    command: ["mock_exporter_local_droplet2.py"]
    ports:
      - "9101:9101"
    restart: always

  mock-exporter-droplet3:
    build: ../mock-scripts-local
    container_name: mock-exporter-droplet3
    command: ["mock_exporter_local_droplet3.py"]
    ports:
      - "9102:9102"
    restart: always

  mock-exporter-droplet4:
    build: ../mock-scripts-local
    container_name: mock-exporter-droplet4
    command: ["mock_exporter_local_droplet4.py"]
    ports:
      - "9103:9103"
    restart: always

  twin-prometheus-local:
    image: prom/prometheus
    container_name: twin-prometheus-local
    ports:
      - "9090:9090"
    volumes:
      - ../mock-scripts-local/prometheus.local.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - mock-exporter-droplet1
      - mock-exporter-droplet2
      - mock-exporter-droplet3
      - mock-exporter-droplet4
    restart: always

volumes:
  influxdb_data: