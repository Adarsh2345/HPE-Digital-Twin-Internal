global:
    scrape_interval: 12s
    evaluation_interval: 12s

scrape_configs:

    - job_name: "digital-twin-api"

      metrics_path: /metrics

      static_configs:
          - targets:
              - "digital-twin-api:5000"

    - job_name: "redis"

      static_configs:
          - targets:
              - "redis:6379"

    - job_name: "neo4j"

      static_configs:
          - targets:
              - "neo4j:2004"